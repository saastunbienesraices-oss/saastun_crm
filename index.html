<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sáastun CRM</title>
<meta name="theme-color" content="#1A1816"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Sáastun CRM"/>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:#1A1816;color:#F5EFE6;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
:root{
  --ink:#1A1816;--ink2:#2A2622;--ink3:#222019;
  --bone:#F5EFE6;--bone2:#C9C2B6;--bone3:#8B8378;
  --terra:#C97D4A;--terra2:#A65A2C;--jade:#2D5C4D;
  --purple:#5C4A8B;--red:#B5453A;--gold:#D4A843;
  --border:rgba(245,239,230,0.08);--r:12px;--r2:8px;--r3:6px;
}
button,input,select,textarea{font-family:'Inter',sans-serif;font-size:15px;color:var(--bone)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--terra);outline-offset:-1px}
button{cursor:pointer;transition:opacity .15s,transform .1s,background .15s}
button:hover{opacity:.88}
button:active{transform:scale(.97)}
button:disabled{opacity:.5;cursor:not-allowed}
textarea{resize:vertical}
a{color:inherit;text-decoration:none}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
.splash-s{font-family:'Fraunces',serif;font-size:60px;font-weight:700;color:var(--terra);animation:breathe 1.4s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.25;transform:scale(.93)}50%{opacity:1;transform:scale(1)}}

/* CONFETTI */
.confetti-piece{position:fixed;top:-10px;width:10px;height:10px;border-radius:2px;animation:cfFall linear forwards;z-index:9998;pointer-events:none}
@keyframes cfFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* BUTTONS */
.btn{border:none;border-radius:var(--r2);padding:10px 18px;font-weight:600;font-size:14px;white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--terra);color:var(--ink)}
.btn-primary:hover{background:#D88A57;opacity:1}
.btn-ghost{background:transparent;color:var(--bone);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(245,239,230,.05);opacity:1}
.btn-jade{background:var(--jade);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-sm{padding:7px 13px;font-size:13px}
.btn-xs{padding:5px 10px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.btn-icon{background:transparent;border:none;color:var(--bone2);padding:7px;border-radius:var(--r2);display:inline-flex;align-items:center;justify-content:center}
.btn-icon:hover{color:var(--bone);background:rgba(245,239,230,.07);opacity:1}

/* INPUTS */
.inp{background:var(--ink3);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;color:var(--bone);width:100%}
.inp::placeholder{color:var(--bone3)}
.field{display:flex;flex-direction:column;gap:5px}
.field-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--bone2)}
.err-box{background:rgba(181,69,58,.15);border:1px solid rgba(181,69,58,.35);color:#E8A89A;font-size:13px;padding:10px 12px;border-radius:var(--r2)}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.login-blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.2;pointer-events:none}
.login-card{position:relative;z-index:1;width:100%;max-width:380px;background:var(--ink2);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;box-shadow:0 30px 60px -20px rgba(0,0,0,.8)}
.login-mark{width:56px;height:56px;margin:0 auto 18px;border-radius:14px;background:linear-gradient(135deg,var(--terra),var(--terra2));display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--ink)}
.login-title{font-family:'Fraunces',serif;font-size:30px;font-weight:600;margin-bottom:4px}
.login-sub{color:var(--bone2);font-size:13px;margin-bottom:28px}

/* SHELL */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:236px;flex-shrink:0;background:var(--ink2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 12px;overflow-y:auto;transition:transform .22s ease;z-index:40}
.sb-brand{display:flex;align-items:center;gap:10px;padding:0 6px 20px}
.sb-glyph{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--terra),var(--terra2));display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:17px;color:var(--ink);flex-shrink:0}
.sb-name{font-family:'Fraunces',serif;font-weight:600;font-size:16px}
.sb-crm{font-size:10px;color:var(--bone2);letter-spacing:.1em;text-transform:uppercase}
.sb-nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:var(--r2);background:transparent;border:none;color:var(--bone2);font-size:13.5px;font-weight:500;width:100%;text-align:left;position:relative}
.nav-btn:hover{background:rgba(245,239,230,.05);color:var(--bone);opacity:1}
.nav-btn.active{background:rgba(201,125,74,.14);color:var(--terra)}
.nav-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--terra);color:var(--ink);font-size:10px;font-weight:700;padding:2px 6px;border-radius:100px;min-width:18px;text-align:center}
.sb-section{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--bone3);padding:14px 10px 6px;margin-top:4px}
.sb-footer{border-top:1px solid var(--border);padding-top:14px;display:flex;align-items:center;gap:8px;margin-top:8px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--jade);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:10px;color:var(--bone2);text-transform:uppercase;letter-spacing:.06em}

/* MOBILE */
.mob-bar{display:none;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);background:var(--ink);position:sticky;top:0;z-index:30;flex-shrink:0}
.mob-title{font-family:'Fraunces',serif;font-weight:600;font-size:17px;flex:1}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:38}

/* MAIN */
.main-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.page{padding:26px 30px 70px;width:100%;max-width:1100px}
.page-hdr{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-h1{font-family:'Fraunces',serif;font-size:25px;font-weight:600;margin-bottom:3px}
.page-sub{color:var(--bone2);font-size:13px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat-card{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r);padding:18px;border-left:4px solid var(--ac,var(--bone3))}
.stat-val{font-family:'Fraunces',serif;font-size:26px;font-weight:600;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:12px;color:var(--bone2)}

/* PANEL */
.panel{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:18px}
.panel-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* KANBAN */
.kanban-wrap{overflow-x:auto;padding-bottom:12px}
.kanban{display:flex;gap:12px;align-items:flex-start;min-width:max-content}
.k-col{width:210px;background:var(--ink2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;flex-shrink:0}
.k-col-hdr{padding:11px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.k-col-title{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.k-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.k-count{font-size:11px;background:rgba(245,239,230,.08);padding:2px 7px;border-radius:100px;color:var(--bone2)}
.k-body{padding:8px;display:flex;flex-direction:column;gap:7px;min-height:60px}
.k-col.drag-over .k-body{background:rgba(201,125,74,.07);border-radius:var(--r2)}
.k-card{background:var(--ink3);border:1px solid var(--border);border-radius:var(--r2);padding:11px 12px;cursor:pointer;transition:border-color .15s,box-shadow .15s;user-select:none;text-align:left;width:100%}
.k-card[draggable]{cursor:grab}
.k-card[draggable]:active{cursor:grabbing}
.k-card:hover{border-color:var(--terra)}
.k-card.dragging{opacity:.45}
.k-card-name{font-weight:600;font-size:13px;margin-bottom:3px}
.k-card-prop{font-size:11px;color:var(--bone2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-card-foot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.k-card-adv{font-size:10px;color:var(--bone3);background:rgba(245,239,230,.06);padding:2px 6px;border-radius:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.k-card-price{font-size:11px;font-weight:600;color:var(--terra)}
.k-pending{border-color:rgba(201,125,74,.4);background:rgba(201,125,74,.05)}
.k-pending-lbl{font-size:10px;font-weight:700;color:var(--terra);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}

/* PIPE BARS */
.pipe-row{display:grid;grid-template-columns:140px 1fr 30px;align-items:center;gap:10px;margin-bottom:9px}
.pipe-lbl{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--bone2)}
.pipe-track{height:7px;border-radius:4px;background:rgba(245,239,230,.06);overflow:hidden}
.pipe-fill{height:100%;border-radius:4px;transition:width .5s ease}
.pipe-n{text-align:right;font-weight:700;font-size:12px}

/* ADVISOR CARDS */
.adv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.adv-card{background:var(--ink3);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.adv-head{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.adv-av{width:34px;height:34px;border-radius:50%;background:var(--terra);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:14px}
.adv-name{font-weight:600;font-size:14px}
.adv-email{font-size:11px;color:var(--bone3)}
.adv-stats{display:flex;gap:18px;margin-bottom:10px}
.adv-sv{display:block;font-family:'Fraunces',serif;font-size:17px;font-weight:600}
.adv-sl{font-size:10px;color:var(--bone2);text-transform:uppercase;letter-spacing:.05em}

/* CLIENT PROFILE */
.profile-screen{display:flex;flex-direction:column;height:100%;overflow:hidden}
.profile-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--ink2)}
.profile-back{background:transparent;border:none;color:var(--bone2);display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;padding:6px 10px;border-radius:var(--r2)}
.profile-back:hover{background:rgba(245,239,230,.06);color:var(--bone);opacity:1}
.profile-name{font-family:'Fraunces',serif;font-size:18px;font-weight:600;flex:1;min-width:0}
.profile-stage{font-size:12px;font-weight:600;padding:4px 10px;border-radius:100px}
.profile-body{flex:1;overflow-y:auto}
.profile-hero{padding:18px 20px;border-bottom:1px solid var(--border);background:var(--ink2)}
.profile-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.action-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--ink3);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;font-size:12px;font-weight:600;color:var(--bone2);cursor:pointer;flex:1;min-width:70px}
.action-btn:hover{border-color:var(--terra);color:var(--terra);opacity:1}
.action-btn svg{width:22px;height:22px}
.profile-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--ink2);position:sticky;top:0;z-index:10}
.profile-tab{flex:1;padding:13px 8px;font-size:13px;font-weight:600;background:transparent;border:none;color:var(--bone2);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.profile-tab.active{color:var(--terra);border-bottom-color:var(--terra)}
.profile-tab:hover{color:var(--bone);opacity:1}
.profile-tab-content{padding:18px 20px 80px}

/* TASKS */
.task-section{margin-bottom:20px}
.task-section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--bone2)}
.task-item{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;display:flex;align-items:flex-start;gap:11px;margin-bottom:7px}
.task-item.overdue{border-color:rgba(181,69,58,.35);background:rgba(181,69,58,.05)}
.task-item.done{opacity:.55}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--bone3);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px}
.task-check.checked{background:var(--jade);border-color:var(--jade)}
.task-check:hover{border-color:var(--terra)}
.task-text{font-size:14px;margin-bottom:3px}
.task-text.done{text-decoration:line-through;color:var(--bone3)}
.task-due{font-size:11px;color:var(--bone3)}
.task-due.overdue{color:#E8A89A}

/* HISTORY */
.hist-item{display:flex;gap:12px;margin-bottom:14px;position:relative}
.hist-item::before{content:'';position:absolute;left:15px;top:28px;bottom:-14px;width:1px;background:var(--border)}
.hist-item:last-child::before{display:none}
.hist-dot{width:30px;height:30px;border-radius:50%;background:var(--ink2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;z-index:1}
.hist-body{flex:1;padding-top:4px}
.hist-txt{font-size:13px;margin-bottom:2px}
.hist-time{font-size:11px;color:var(--bone3)}

/* NOTES */
.note-item{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:8px}
.note-txt{font-size:14px;line-height:1.5;margin-bottom:6px}
.note-meta{font-size:11px;color:var(--bone3)}

/* CALL MODAL */
.call-result-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.call-result-btn{padding:14px;border-radius:var(--r);font-weight:700;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:6px}

/* AI COACH */
.ai-box{background:linear-gradient(135deg,rgba(45,92,77,.15),rgba(92,74,139,.15));border:1px solid rgba(45,92,77,.3);border-radius:var(--r);padding:18px;margin-bottom:16px}
.ai-box-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-weight:600;font-size:14px;color:var(--jade)}
.ai-response{font-size:14px;line-height:1.65;color:var(--bone);white-space:pre-wrap}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--bone2);font-size:13px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--jade);animation:aiPulse 1.2s ease-in-out infinite}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes aiPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.ai-chat{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.ai-msg{padding:10px 13px;border-radius:var(--r2);font-size:13px;line-height:1.5;max-width:90%}
.ai-msg.user{background:rgba(201,125,74,.15);border:1px solid rgba(201,125,74,.2);align-self:flex-end}
.ai-msg.bot{background:var(--ink2);border:1px solid var(--border);align-self:flex-start;white-space:pre-wrap}
.ai-input-row{display:flex;gap:8px;margin-top:10px}
.ai-input-row input{flex:1}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--bone2);padding:6px 0;text-transform:uppercase}
.cal-day{min-height:70px;background:var(--ink2);border:1px solid var(--border);border-radius:var(--r3);padding:6px;cursor:pointer;transition:border-color .15s}
.cal-day:hover{border-color:var(--terra)}
.cal-day.today{border-color:var(--terra);background:rgba(201,125,74,.06)}
.cal-day.other-month{opacity:.4}
.cal-day-num{font-size:12px;font-weight:600;margin-bottom:4px}
.cal-event{font-size:10px;background:var(--terra);color:var(--ink);border-radius:3px;padding:2px 5px;margin-bottom:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-event.pub{background:var(--jade)}
.pub-list{display:flex;flex-direction:column;gap:8px}
.pub-item{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:center;gap:14px}
.pub-item.done-pub{opacity:.6}
.pub-date{font-size:12px;color:var(--bone2);flex-shrink:0;width:80px}
.pub-content{flex:1;min-width:0}
.pub-title{font-weight:600;font-size:14px;margin-bottom:2px}
.pub-adv{font-size:12px;color:var(--bone3)}
.pub-status{font-size:11px;font-weight:700;padding:4px 9px;border-radius:100px;flex-shrink:0}
.pub-status.pending{color:var(--terra);background:rgba(201,125,74,.12)}
.pub-status.done-s{color:var(--jade);background:rgba(45,92,77,.15)}

/* PROPERTIES */
.prop-list{display:flex;flex-direction:column;gap:8px}
.prop-row{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.prop-name{font-weight:600;font-size:14px;margin-bottom:2px}
.prop-loc{font-size:12px;color:var(--bone3)}
.prop-com{font-size:14px;font-weight:700;color:var(--terra)}

/* NOTIFICATIONS */
.notif-item{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;display:flex;gap:11px;margin-bottom:8px}
.notif-item.unread{border-color:rgba(201,125,74,.3);background:rgba(201,125,74,.04)}
.notif-dot2{width:8px;height:8px;border-radius:50%;background:var(--terra);flex-shrink:0;margin-top:5px}
.notif-dot2.read{background:transparent;border:1px solid var(--border)}
.notif-txt{font-size:14px;margin-bottom:3px}
.notif-time{font-size:11px;color:var(--bone3)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;backdrop-filter:blur(6px)}
.modal{background:var(--ink2);border:1px solid var(--border);border-radius:18px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 60px -20px rgba(0,0,0,.8)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-hdr h2{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:13px}
.modal-foot{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:14px 22px;border-bottom:none;border-top:1px solid var(--border);flex-wrap:wrap}

/* LEADS LIST */
.lead-row{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r2);padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;width:100%;text-align:left;color:var(--bone);margin-bottom:7px}
.lead-row:hover{border-color:var(--terra)}
.lead-name{font-weight:600;font-size:14px;margin-bottom:2px}
.lead-meta{font-size:12px;color:var(--bone3)}
.stage-pill{font-size:11px;font-weight:600;padding:4px 9px;border-radius:100px;white-space:nowrap;flex-shrink:0}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-sel{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r2);padding:8px 12px;color:var(--bone);font-size:13px}
.search-inp{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r2);padding:9px 14px;color:var(--bone);font-size:13px;min-width:200px}
.search-inp::placeholder{color:var(--bone3)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;border:1px dashed var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;gap:8px}
.empty-ico{width:46px;height:46px;border-radius:50%;background:rgba(201,125,74,.1);color:var(--terra);display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.empty h2{font-family:'Fraunces',serif;font-size:18px}
.empty p{color:var(--bone3);font-size:13px;margin-bottom:10px}

/* CONFIRM CIERRE */
.cierre-card{background:rgba(45,92,77,.1);border:1px solid rgba(45,92,77,.25);border-radius:var(--r);padding:20px;margin-bottom:14px}
.cierre-com{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--terra);margin-bottom:4px}

/* RESPONSIVE */
@media(max-width:820px){
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);box-shadow:20px 0 40px rgba(0,0,0,.6)}
  .sidebar.open{transform:none}
  .mob-bar{display:flex}
  .mob-overlay.show{display:block}
  .page{padding:16px 14px 70px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .k-col{width:195px}
  .profile-hdr{padding:12px 14px}
  .profile-tab-content{padding:14px 14px 80px}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .k-col{width:180px}
  .cal-grid{display:none}
}

/* ── LIGHT MODE ── */
body.light-mode{background:#F0EBE3;color:#1A1816}
body.light-mode:root{--ink:#F0EBE3;--ink2:#FFFFFF;--ink3:#F5EFE6;--border:rgba(26,24,22,0.12);--bone:#1A1816;--bone2:#4A4540;--bone3:#7A7068}
body.light-mode .sidebar,body.light-mode .mob-bar{background:#fff;border-color:rgba(26,24,22,.1)}
body.light-mode .panel,body.light-mode .stat-card,body.light-mode .modal,body.light-mode .k-col,body.light-mode .k-card,body.light-mode .lead-row,body.light-mode .task-item,body.light-mode .note-item,body.light-mode .notif-item,body.light-mode .adv-card,body.light-mode .prop-row{background:#fff;border-color:rgba(26,24,22,.1);color:#1A1816}
body.light-mode .inp,body.light-mode .filter-sel,body.light-mode .search-inp{background:#F5EFE6;border-color:rgba(26,24,22,.15);color:#1A1816}
body.light-mode .nav-btn{color:#4A4540}
body.light-mode .nav-btn:hover{background:rgba(26,24,22,.06);color:#1A1816}
body.light-mode .nav-btn.active{background:rgba(201,125,74,.15);color:var(--terra)}
body.light-mode .sb-name,body.light-mode .sb-crm,body.light-mode .sb-uname,body.light-mode .sb-urole{color:#1A1816}
body.light-mode .page-h1,body.light-mode .panel-title{color:#1A1816}
body.light-mode .page-sub,body.light-mode .stat-lbl,body.light-mode .bone2{color:#4A4540}
body.light-mode .k-body{background:#F5EFE6}
body.light-mode .btn-ghost{color:#1A1816;border-color:rgba(26,24,22,.2)}
body.light-mode .btn-ghost:hover{background:rgba(26,24,22,.05)}
body.light-mode .profile-hdr,body.light-mode .profile-hero,body.light-mode .profile-tabs{background:#fff;border-color:rgba(26,24,22,.1)}
body.light-mode .main-area{background:#F0EBE3}
body.light-mode .shell{background:#F0EBE3}

/* ── RANKING ── */
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--bone2);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.rank-table td{padding:13px 12px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
.rank-table tr:last-child td{border-bottom:none}
.rank-medal{font-size:20px;line-height:1}
.rank-bar{height:5px;border-radius:3px;background:var(--terra);margin-top:4px}

/* ── ROBOT MODE ── */
.robot-card{background:linear-gradient(135deg,rgba(201,125,74,.12),rgba(92,74,139,.08));border:1.5px solid rgba(201,125,74,.3);border-radius:var(--r);padding:20px;margin-bottom:14px}
.robot-badge{display:inline-flex;align-items:center;gap:6px;background:var(--terra);color:var(--ink);font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.robot-who{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:4px}
.robot-why{font-size:13px;color:var(--bone2);margin-bottom:14px}
.robot-script{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;font-size:13px;line-height:1.65;color:var(--bone);margin-bottom:14px;position:relative}
.robot-script-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--bone3);margin-bottom:6px}
.robot-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ── COMMISSION BANNER ── */
.com-banner{background:linear-gradient(135deg,rgba(212,168,67,.15),rgba(201,125,74,.1));border:1px solid rgba(212,168,67,.3);border-radius:var(--r);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.com-total{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--gold)}
.com-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--bone2);margin-bottom:3px}

/* ── GLOBAL SEARCH ── */
.gsearch-wrap{position:relative;max-width:420px}
.gsearch-res{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--ink2);border:1px solid var(--border);border-radius:var(--r2);z-index:100;max-height:320px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.gsearch-item{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--border)}
.gsearch-item:last-child{border-bottom:none}
.gsearch-item:hover{background:rgba(201,125,74,.07)}
.gsearch-name{font-size:14px;font-weight:600}
.gsearch-meta{font-size:11px;color:var(--bone3)}

/* ── INACTIVITY ALERT ── */
.inact-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(181,69,58,.15);border:1px solid rgba(181,69,58,.3);color:#E8A89A;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;margin-left:6px}

/* ── ADVISOR META INDIVIDUAL ── */
.adv-meta-bar{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* OFFLINE BANNER */
.offline-banner{position:fixed;top:0;left:0;right:0;background:#B5453A;color:#fff;text-align:center;font-size:13px;font-weight:600;padding:8px;z-index:9999;display:none}
.offline-banner.show{display:block}
</style>

let dashFilter="mes"; // "mes" | "anterior" | "todo"

function filterLeadsByTime(ll){
  if(dashFilter==="todo")return ll;
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth();
  return ll.filter(l=>{
    if(!l.creado)return dashFilter==="mes";
    const d=l.creado.toDate?l.creado.toDate():new Date(l.creado);
    if(dashFilter==="mes")return d.getFullYear()===y&&d.getMonth()===m;
    if(dashFilter==="anterior"){const pm=m===0?11:m-1,py=m===0?y-1:y;return d.getFullYear()===py&&d.getMonth()===pm;}
    return true;
  });
}

x;background:rgba(245,239,230,.08);border-radius:3px;overflow:hidden"><div style="height:100%;width:${myMetaPctAdv}%;background:${myMetaPctAdv>=100?"var(--gold)":"var(--terra)"};border-radius:3px"></div></div></div>`:""}${pipeBars(al,true)}</div>`;}).join("")||`<p style="color:var(--bone3);font-size:13px">Los asesores aparecerán aquí al iniciar sesión.</p>`}</div></div>`:""}

function SC(l,v,c){return`<div class="stat-card" style="--ac:${c}"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`;}

function calcStats(ll){
  const gan=ll.filter(l=>l.etapa==="ganado"&&!l.pendienteConfirmacion);
  const com=gan.reduce((s,l)=>{const p=props.find(p=>p.id===l.propiedadId);return s+(p?.comision||0);},0);
  return{ganados:gan.length,negoc:ll.filter(l=>l.etapa==="negociacion").length,comision:com};
}

function pipeBars(ll,compact=false){
  const tot=ll.length||1;
  return STAGES.map(s=>{const n=ll.filter(l=>l.etapa===s.id).length,pct=(n/tot)*100;
    return`<div class="pipe-row" style="${compact?"grid-template-columns:110px 1fr 26px;font-size:11px":""}"><div class="pipe-lbl"><span class="k-dot" style="background:${s.color}"></span>${s.label}</div><div class="pipe-track"><div class="pipe-fill" style="width:${pct}%;background:${s.color}"></div></div><div class="pipe-n">${n}</div></div>`;
  }).join("");
}

function vRanking(){
  const adv=users.filter(u=>u.rol!=="admin");
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const monthLeads=l=>{
    const al=leads.filter(x=>x.asesorId===l.id);
    return al.filter(x=>{
      if(!x.creado)return false;
      const d=x.creado.toDate?x.creado.toDate():new Date(x.creado);
      return d.getFullYear()===y&&d.getMonth()===m;
    });
  };
  const rows=adv.map(a=>{
    const al=monthLeads(a);
    const gan=leads.filter(x=>x.asesorId===a.id&&x.etapa==="ganado"&&!x.pendienteConfirmacion&&(()=>{if(!x.fechaCierre)return false;const d=x.fechaCierre.toDate?x.fechaCierre.toDate():new Date(x.fechaCierre);return d.getFullYear()===y&&d.getMonth()===m;})());
    const com=gan.reduce((s,l)=>{const p=props.find(p=>p.id===l.propiedadId);return s+(p?.comision||0);},0);
    const meta=advMetas[a.id]||0;
    const activos=leads.filter(x=>x.asesorId===a.id&&!["ganado","perdido"].includes(x.etapa)).length;
    const twoD=new Date(now-2*24*60*60*1000);
    const inact=leads.filter(x=>x.asesorId===a.id&&!["ganado","perdido"].includes(x.etapa)&&(x.actualizado?.toDate?x.actualizado.toDate():new Date(0))<twoD).length;
    return{...a,cierres:gan.length,comision:com,meta,activos,inact,leadsTotal:al.length};
  }).sort((a,b)=>b.comision-a.comision||b.cierres-a.cierres);
  const maxCom=rows[0]?.comision||1;
  const medals=["🥇","🥈","🥉"];
  const monthNames=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  return`<div class="page">
    <div class="page-hdr">
      <div><div class="page-h1">🏆 Ranking del equipo</div><div class="page-sub">${monthNames[m]} ${y}</div></div>
      <button class="btn btn-ghost btn-sm" onclick="openAdvMetaForm()">🎯 Metas individuales</button>
    </div>
    ${rows.length?`
    <div class="panel">
      <table class="rank-table">
        <thead><tr><th>#</th><th>Asesor</th><th>Cierres</th><th>Comisión ganada</th><th>Meta</th><th>Pipeline activo</th><th>Inactivos</th></tr></thead>
        <tbody>
          ${rows.map((a,i)=>{
            const metaPct=a.meta?Math.min(100,Math.round((a.comision/a.meta)*100)):null;
            return`<tr>
              <td><span class="rank-medal">${medals[i]||i+1}</span></td>
              <td>
                <div style="display:flex;align-items:center;gap:9px">
                  <div class="sb-avatar" style="background:${i===0?"var(--gold)":i===1?"var(--bone3)":i===2?"var(--terra2)":"var(--jade)"};font-size:12px">${a.nombre?.[0]?.toUpperCase()||"?"}</div>
                  <div>
                    <div style="font-weight:600;font-size:14px">${a.nombre}</div>
                    <div style="font-size:11px;color:var(--bone3)">${a.email}</div>
                    ${a.activo===false?`<span style="font-size:10px;font-weight:700;color:#E8A89A;background:rgba(181,69,58,.15);padding:1px 6px;border-radius:100px">INACTIVO</span>`:""}
                  </div>
                </div>
              </td>
              <td><strong style="font-size:18px;font-family:'Fraunces',serif">${a.cierres}</strong></td>
              <td>
                <div style="font-weight:700;color:var(--terra)">${fmtM(a.comision)}</div>
                <div class="rank-bar" style="width:${(a.comision/maxCom)*100}%;max-width:120px"></div>
              </td>
              <td>
                ${a.meta?`<div style="font-size:12px;color:var(--bone2)">${fmtM(a.meta)}</div>
                <div style="font-size:12px;font-weight:600;color:${metaPct>=100?"var(--gold)":metaPct>=60?"var(--jade)":"var(--bone3)"}">${metaPct}%${metaPct>=100?" 🏆":""}</div>`:
                `<button class="btn btn-xs btn-ghost" onclick="openAdvMetaForm('${a.id}')">Poner meta</button>`}
              </td>
              <td><span style="font-weight:600">${a.activos}</span> <span style="font-size:11px;color:var(--bone3)">leads</span></td>
              <td>${a.inact?`<span style="color:#E8A89A;font-weight:700">${a.inact} ⚠️</span>`:`<span style="color:var(--jade)">0 ✓</span>`}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>

    <div class="panel">
      <div class="panel-title">📋 Historial de conversaciones por asesor</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">

    :`<div class="empty"><div class="empty-ico">🏆</div><h2>Sin asesores</h2><p>Agrega asesores para ver el ranking.</p></div>`}
  </div>`;
}

function prioritizeLeads(ll){
  const now=new Date();
  return [...ll].sort((a,b)=>{
    const scoreA=getLeadPriority(a,now),scoreB=getLeadPriority(b,now);
    return scoreB-scoreA;
  });
}

function getLeadPriority(l,now){
  let score=0;
  const lastAct=l.actualizado?.toDate?l.actualizado.toDate():new Date(l.actualizado||l.creado?.toDate?.()||new Date(0));
  const daysSince=Math.floor((now-lastAct)/(1000*60*60*24));
  if(l.etapa==="negociacion")score+=100;
  else if(l.etapa==="cita_realizada")score+=80;
  else if(l.etapa==="cita_asignada")score+=60;
  else if(l.etapa==="prospecto")score+=20;
  score+=Math.min(daysSince*5,50);
  if(l.score)score+=l.score*3;
  return score;
}

function getNextActionLead(ll){return prioritizeLeads(ll)[0]||null;}

function getReason(l){
  const lastAct=l.actualizado?.toDate?l.actualizado.toDate():new Date(l.actualizado||l.creado?.toDate?.()||new Date(0));
  const d=Math.floor((new Date()-lastAct)/(1000*60*60*24));
  if(l.etapa==="negociacion")return"🔥 En negociación — está caliente, ciérralo hoy";
  if(l.etapa==="cita_realizada")return"⚡ Ya tuvo cita — dale seguimiento antes de que se enfríe";
  if(l.etapa==="cita_asignada")return"📅 Cita próxima — confirma la cita con el cliente";
  if(d>=5)return`😴 Sin contacto por ${d} días — se puede perder`;
  if(d>=3)return`⏰ ${d} días sin contacto — dale seguimiento`;
  return"📬 Prospecto nuevo — primer contacto";
}

const SCRIPTS={
  negociacion:(n,prop)=>`"Hola ${n}, te habla [tu nombre] de Sáastun. Te llamo porque estamos muy cerca de cerrar ${prop?"la "+prop:"tu propiedad"}, y quiero asegurarme de que tengas toda la info que necesitas para decidir. ¿Tienes 5 minutos?"`,
  cita_realizada:(n,prop)=>`"Hola ${n}, ¿cómo estás? Te llamo para darle seguimiento a la visita que tuviste ${prop?"en "+prop:""}. ¿Qué te pareció? ¿Tienes alguna pregunta o duda que podamos resolver hoy?"`,
  cita_asignada:(n)=>`"Hola ${n}, te llamo para confirmar nuestra cita. ¿Todo sigue en pie? ¿Necesitas que te comparta la dirección o algún detalle?"`,
  prospecto:(n,prop)=>`"Hola ${n}, te habla [tu nombre] de Sáastun. Vi que tienes interés en ${prop||"nuestras propiedades"}. Quisiera platicar contigo 5 minutos para entender qué buscas y ver cómo podemos ayudarte. ¿Es buen momento?"`,
};

function getScript(l){
  if(!l)return"";
  const prop=l.propiedad||"";
  const fn=SCRIPTS[l.etapa]||SCRIPTS.prospecto;
  return fn(l.nombre,prop);
}

window.onDragStart=function(e,id){dragId=id;setTimeout(()=>document.querySelector(`[data-id="${id}"]`)?.classList.add("dragging"),0);};

window.onDrop=async function(e,stageId){
  e.preventDefault();document.querySelectorAll(".drag-over").forEach(el=>el.classList.remove("drag-over"));
  if(!dragId)return;const lead=leads.find(l=>l.id===dragId);if(!lead||lead.etapa===stageId){dragId=null;return;}
  if(stageId==="ganado"){
    await updateDoc(doc(db,"leads",dragId),{etapa:"ganado",pendienteConfirmacion:true,actualizado:serverTimestamp()});
    await addNotif(`${CP?.nombre} marcó a "${lead.nombre}" como Cierre ganado — pendiente confirmación`,true,null,"cierre_pendiente",dragId);
    sendWA(`🏆 *${CP?.nombre}* marcó a *${lead.nombre}* como Cierre Ganado. Entra al CRM para confirmar.`);
  } else {
    await updateDoc(doc(db,"leads",dragId),{etapa:stageId,pendienteConfirmacion:false,actualizado:serverTimestamp()});
    await addHistorial(dragId,`Movido a ${SM[stageId]?.label}`,"📋");
    await addNotif(`${CP?.nombre} movió a "${lead.nombre}" → ${SM[stageId]?.label}`,true,null,"etapa",dragId);
    if(!isAdmin())sendWA(`📋 *${CP?.nombre}* movió a *${lead.nombre}* → *${SM[stageId]?.label}*`);
    // Configurable alert: notify admin when entering negociacion
    if(stageId==="negociacion"&&alertConfig.notifyOnNegociacion&&!isAdmin()){
      await addNotif(`🔥 ${CP?.nombre} movió a "${lead.nombre}" a NEGOCIACIÓN`,true,null,"negociacion_alert",dragId);
      sendPushNotif("🔥 Entrada a Negociación",`${CP?.nombre} → ${lead.nombre}`);
    }
    if(stageId==="cita_asignada"&&alertConfig.notifyOnCita){
      await addNotif(`📅 Cita agendada por ${CP?.nombre} con "${lead.nombre}"`,true,null,"cita_alert",dragId);
    }
  }
  dragId=null;
};

function renderProfileTasks(lead){
  // Tasks are stored as subcollection leads/{id}/tareas
  // For rendering, we'll show from cached tasks or load
  const tasksKey="tasks_"+lead.id;
  if(!window._tasksCache)window._tasksCache={};
  if(!window._tasksCache[lead.id]){
    // Start listener
    onSnapshot(query(collection(db,"leads",lead.id,"tareas"),orderBy("creado")),snap=>{
      window._tasksCache[lead.id]=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(profileLeadId===lead.id&&profileTab==="tareas"){
        const ptc=document.getElementById("ptc");
        if(ptc)ptc.innerHTML=renderProfileTasks(lead);
      }
    });
    return`<div style="color:var(--bone2);font-size:14px;padding:20px 0">Cargando tareas…</div>`;
  }
  const tasks=window._tasksCache[lead.id]||[];
  const now=new Date();
  const pending=tasks.filter(t=>!t.completada&&(!t.fechaVence||new Date(t.fechaVence)>=now));
  const overdue=tasks.filter(t=>!t.completada&&t.fechaVence&&new Date(t.fechaVence)<now);
  const done=tasks.filter(t=>t.completada);

  return`
  <div>
    <button class="btn btn-primary btn-sm" style="margin-bottom:18px;width:100%" onclick="openTaskForm('${lead.id}')">+ Agregar tarea</button>
    ${overdue.length?`<div class="task-section"><div class="task-section-hdr" style="color:#E8A89A">⚠️ Vencidas (${overdue.length})</div>${overdue.map(t=>taskItem(t,lead.id,true)).join("")}</div>`:""}
    <div class="task-section"><div class="task-section-hdr">📌 Por realizar (${pending.length})</div>${pending.length?pending.map(t=>taskItem(t,lead.id)).join(""):`<p style="color:var(--bone3);font-size:13px;padding:8px 0">Sin tareas pendientes.</p>`}</div>
    ${done.length?`<div class="task-section"><div class="task-section-hdr" style="color:var(--jade)">✅ Realizadas (${done.length})</div>${done.map(t=>taskItem(t,lead.id)).join("")}</div>`:""}
  </div>`;
}

function taskItem(t,leadId,ov=false){
  return`<div class="task-item${t.completada?" done":ov?" overdue":""}">
    <div class="task-check${t.completada?" checked":""}" onclick="toggleTask('${leadId}','${t.id}',${!t.completada})">${t.completada?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`:""}</div>
    <div style="flex:1">
      <div class="task-text${t.completada?" done":""}">${t.texto}</div>
      ${t.fechaVence?`<div class="task-due${ov?" overdue":""}">📅 ${fmtDateShort(t.fechaVence)}</div>`:""}
    </div>
  </div>`;
}

const GEMINI_KEY="AQ.Ab8RN6KLbymXi13oGHgLix73ue3VsnUrPwlXP6JiPdyUxg_VDw";

async function callAI(messages){
  try{
    const contents=messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}));
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents,generationConfig:{maxOutputTokens:1000,temperature:0.7}})
    });
    const d=await r.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text||"No pude generar una respuesta.";
  }catch(e){console.error(e);return"Error conectando con la IA. Intenta de nuevo.";}
}

window.updateComPreview=function(){
  const sel=document.getElementById("lf-prop");
  const man=document.getElementById("lf-prop-manual");
  const prev=document.getElementById("lf-com-prev");
  const val=document.getElementById("lf-com-val");
  if(!sel)return;
  if(sel.value==="otro"){man&&(man.style.display="");prev&&(prev.style.display="none");}
  else if(sel.value){
    man&&(man.style.display="none");
    const opt=sel.options[sel.selectedIndex];
    const c=Number(opt.dataset.com||0);
    if(c&&prev&&val){prev.style.display="";val.textContent=fmtM(c);}
    else prev&&(prev.style.display="none");
  } else {man&&(man.style.display="none");prev&&(prev.style.display="none");}
};

function vCalendario(){
  const adv=users.filter(u=>u.rol!=="admin");
  const today=new Date();
  const year=calMonth.getFullYear(),month=calMonth.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthNames=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const dayNames=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const monthPubs=pubs.filter(p=>{
    if(!p.fecha)return false;
    const d=new Date(p.fecha);
    return d.getMonth()===month&&d.getFullYear()===year&&(isAdmin()||p.asesorId===CU.uid);
  });
  let calCells="";
  for(let i=0;i<firstDay;i++)calCells+=`<div style="min-height:60px"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dayPubs=monthPubs.filter(p=>p.fecha?.startsWith(dateStr));
    const isToday=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
    calCells+=`<div style="min-height:60px;background:var(--ink2);border:1px solid ${isToday?"var(--terra)":"var(--border)"};border-radius:6px;padding:5px;cursor:pointer" onclick="openPubForm(null,'${dateStr}')">
      <div style="font-size:12px;font-weight:600;margin-bottom:3px">${d}</div>
      ${dayPubs.slice(0,2).map(p=>`<div style="font-size:10px;background:${p.publicado?"var(--jade)":"var(--terra)"};color:var(--ink);border-radius:3px;padding:2px 4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.titulo||"Pub"}</div>`).join("")}
    </div>`;
  }
  const myPubs=pubs.filter(p=>isAdmin()||p.asesorId===CU.uid).sort((a,b)=>(a.fecha||"").localeCompare(b.fecha||""));
  return`<div class="page">
    <div class="page-hdr"><div><div class="page-h1">Publicaciones</div><div class="page-sub">Calendario de contenido</div></div>${isAdmin()?`<button class="btn btn-primary btn-sm" onclick="openPubForm()">+ Nueva</button>`:""}</div>
    <div class="panel">
      <div class="panel-title" style="display:flex;align-items:center;justify-content:space-between">
        <button class="btn-icon" onclick="changeMonth(-1)">←</button>
        <span>${monthNames[month]} ${year}</span>
        <button class="btn-icon" onclick="changeMonth(1)">→</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
        ${dayNames.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--bone2);padding:5px 0;text-transform:uppercase">${d}</div>`).join("")}
        ${calCells}
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Lista de publicaciones</div>
      ${myPubs.length?myPubs.map(p=>{const a=users.find(u=>u.id===p.asesorId);return`
      <div style="background:var(--ink3);border:1px solid var(--border);border-radius:8px;padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:7px;${p.publicado?"opacity:.65":""}">
        <div style="font-size:12px;color:var(--bone2);flex-shrink:0;width:75px">${fmtDateShort(p.fecha)}<br/><span style="font-size:10px">${p.hora||""}</span></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;margin-bottom:1px">${p.titulo||"Sin título"}</div>
          <div style="font-size:11px;color:var(--bone3)">${a?.nombre||"Sin asignar"}${p.red?" · "+p.red:""}</div>
        </div>
        <span style="font-size:11px;font-weight:700;padding:4px 9px;border-radius:100px;${p.publicado?"color:var(--jade);background:rgba(45,92,77,.15)":"color:var(--terra);background:rgba(201,125,74,.12)"}">${p.publicado?"✓ Listo":"Pendiente"}</span>
        ${isAdmin()?`<button class="btn-icon" onclick="openPubForm('${p.id}')">${icoEdit()}</button>`:""}
        ${!p.publicado?`<button class="btn btn-xs btn-jade" onclick="marcarPublicado('${p.id}')">✓</button>`:""}
      </div>`;}).join("")
      :`<div class="empty" style="padding:30px 20px"><h2>Sin publicaciones</h2><p>${isAdmin()?"Crea la primera.":"Sin publicaciones asignadas."}</p></div>`}
    </div>
  </div>`;
}

// ── UTILS ──
function fmtM(n){if(!n)return"$0";return"$"+Number(n).toLocaleString("es-MX");}
function fmtDate(ts){if(!ts)return"";try{const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString("es-MX",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});}catch{return"";}}
function fmtDateShort(s){if(!s)return"";try{const d=new Date(s+"T12:00:00");return d.toLocaleDateString("es-MX",{day:"numeric",month:"short"});}catch{return s;}}
function sendWA(msg){console.log("WA:",msg);}
function showConfetti(){
  const cols=["#C97D4A","#2D5C4D","#F5EFE6","#5C4A8B","#B5562E","#FFDD57"];
  for(let i=0;i<90;i++){const el=document.createElement("div");el.className="confetti-piece";el.style.cssText=`left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*9}px;height:${6+Math.random()*9}px;animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*0.6}s;border-radius:${Math.random()>.5?"50%":"3px"};`;document.body.appendChild(el);setTimeout(()=>el.remove(),5000);}
}

function showModal(html){

async function requestPushPermission(){
  if(!("Notification" in window))return false;
  if(Notification.permission==="granted")return true;
  const perm=await Notification.requestPermission();
  return perm==="granted";

function playNotifSound() {
  try {
    const audio = new Audio('data:audio/ogg;codecs=opus;base64,' + NOTIF_B64);
    audio.volume = 1.0;
    const p = audio.play();
    if (p && p.catch) p.catch(function() {
      const go = function() { new Audio('data:audio/ogg;codecs=opus;base64,' + NOTIF_B64).play(); document.removeEventListener('click', go); };
      document.addEventListener('click', go, { once: true });
    });
  } catch(e) { console.warn('Audio:', e); }
}

const _pendingAlerts = new Map();
window.dismissAlert = function(key) {
  const a = _pendingAlerts.get(key);
  if (a) { clearInterval(a.intervalId); _pendingAlerts.delete(key); }
  const el = document.getElementById('pb-' + key);
  if (el) el.remove();
};

function showBanner(title, body, key, leadId) {
  const existing = document.getElementById('pb-' + key);
  if (existing) existing.remove();
  const d = document.createElement('div');
  d.id = 'pb-' + key;
  d.setAttribute('style', 'position:fixed;top:64px;right:14px;z-index:9999;background:#2A2622;border:1.5px solid #C97D4A;border-radius:14px;padding:14px 16px;width:290px;box-shadow:0 8px 32px rgba(0,0,0,.7);animation:sbIn .3s ease;font-family:Inter,sans-serif');
  const btnVer = leadId
    ? '<button onclick="openProfile(\'' + leadId + '\');window.dismissAlert(\'' + key + '\')" style="flex:1;background:#C97D4A;color:#1A1816;border:none;border-radius:8px;padding:8px;font-weight:700;font-size:12px;cursor:pointer">Ver cliente</button>'
    : '';
  d.innerHTML = '<style>@keyframes sbIn{from{transform:translateX(310px);opacity:0}to{transform:none;opacity:1}}</style>'
    + '<div style="display:flex;gap:10px;align-items:flex-start">'
    + '<div style="font-size:22px">🔔</div>'
    + '<div style="flex:1;min-width:0">'
    + '<div style="font-weight:700;font-size:14px;color:#F5EFE6;margin-bottom:3px">' + title + '</div>'
    + '<div style="font-size:12px;color:#C9C2B6;line-height:1.4">' + body + '</div>'
    + '<div style="font-size:10px;color:#8B8378;margin-top:3px">Repite cada 3 min hasta que actues</div>'
    + '</div>'
    + '<button onclick="window.dismissAlert(\'' + key + '\')" style="background:none;border:none;color:#8B8378;font-size:20px;cursor:pointer;line-height:1">x</button>'
    + '</div>'
    + '<div style="display:flex;gap:8px;margin-top:10px">'
    + btnVer
    + '<button onclick="window.dismissAlert(\'' + key + '\')" style="flex:1;background:rgba(245,239,230,.08);color:#F5EFE6;border:1px solid rgba(245,239,230,.15);border-radius:8px;padding:8px;font-weight:600;font-size:12px;cursor:pointer">Entendido</button>'
    + '</div>';
  document.body.appendChild(d);
}

function startPersistentAlert(key, title, body, leadId) {
  if (_pendingAlerts.has(key)) return;
  playNotifSound();
  showBanner(title, body, key, leadId);
  const intervalId = setInterval(function() {
    if (!_pendingAlerts.has(key)) { clearInterval(intervalId); return; }
    playNotifSound();
    showBanner(title, body, key, leadId);
  }, 3 * 60 * 1000);
  _pendingAlerts.set(key, { intervalId: intervalId });
}

// addNotif: guarda en Firestore y activa sonido
async function addNotif(texto, paraAdmin, paraUid, tipo, leadId) {
  try {
    await addDoc(collection(db, 'notificaciones'), {
      texto: texto, paraAdmin: !!paraAdmin,
      paraUid: paraUid || null, tipo: tipo || 'general',
      leadId: leadId || null, leida: false, fecha: serverTimestamp()
    });
  } catch(e) { console.error('addNotif:', e); }
  const sonar = (paraAdmin && isAdmin()) || (paraUid && paraUid === CU.uid);
  if (sonar) {
    const key = (tipo || 'n') + '_' + (leadId || '') + '_' + Date.now();
    startPersistentAlert(key, 'Saastun CRM', texto, leadId);
  }
}

function sendPushNotif(title, body, leadId) {
  const key = 'push_' + (leadId || 'g') + '_' + Date.now();
  startPersistentAlert(key, title, body, leadId || null);
  if (Notification.permission === 'granted') {
    try {
      const n = new Notification(title, {body: body, icon: 'https://placehold.co/64x64/C97D4A/1A1816?text=S', tag: key});
      if (leadId) n.onclick = function() { openProfile(leadId); window.dismissAlert(key); window.focus(); };
    } catch(e) {}
  }
}

// Run auto-checks every 5 minutes
let autoCheckInterval=null;
function startAutoChecks(){
  if(autoCheckInterval)clearInterval(autoCheckInterval);
  runAutoChecks();
  autoCheckInterval=setInterval(runAutoChecks,5*60*1000);
}

async function runAutoChecks(){
  if(!CU||!CP)return;
  const now=new Date();
  const todayStr=now.toISOString().split("T")[0];

  // 1. Check overdue tasks for MY leads
  const myL=myLeads();
  for(const lead of myL){
    const tasks=window._tasksCache?.[lead.id]||[];
    const overdue=tasks.filter(t=>!t.completada&&t.fechaVence&&t.fechaVence<todayStr);
    if(overdue.length>0){
      const alreadyNotified=window._notifiedTasks||new Set();
      for(const t of overdue){
        const key=`task_${lead.id}_${t.id}`;
        if(!alreadyNotified.has(key)){
          alreadyNotified.add(key);
          window._notifiedTasks=alreadyNotified;
          sendPushNotif(`⚠️ Tarea vencida`,`"${t.texto}" — Cliente: ${lead.nombre}`,lead.id);
          await addNotif(`⚠️ Tarea vencida: "${t.texto}" del cliente ${lead.nombre}`,isAdmin(),isAdmin()?null:CU.uid,"tarea_vencida",lead.id);
        }
      }
    }

    // 2. Check appointments today (leads with cita_asignada and task today)
    if(lead.etapa==="cita_asignada"){
      const citaHoy=tasks.filter(t=>!t.completada&&t.fechaVence===todayStr&&(t.texto.toLowerCase().includes("cita")||t.texto.toLowerCase().includes("visita")));
      for(const c of citaHoy){
        const key=`cita_${lead.id}_${c.id}_${todayStr}`;
        const notif=window._notifiedTasks||new Set();
        if(!notif.has(key)){
          notif.add(key);window._notifiedTasks=notif;
          sendPushNotif(`📅 Cita hoy`,`Cita con ${lead.nombre} — ${c.texto}`,lead.id);
        }
      }
    }
  }

  // 3. Check inactive leads - using configurable days
  if(window._lastInactiveCheck&&(now-window._lastInactiveCheck)<3600000)return;
  window._lastInactiveCheck=now;

  const inactiveDays=alertConfig.inactiveAfterDays||2;
  const inactiveThreshold=new Date(now-inactiveDays*24*60*60*1000);
  for(const lead of myL){
    if(["ganado","perdido"].includes(lead.etapa))continue;
    const lastActivity=lead.actualizado?.toDate?lead.actualizado.toDate():new Date(lead.actualizado||lead.creado?.toDate?.()|| new Date(0));
    if(lastActivity<inactiveThreshold){
      const key=`inactive_${lead.id}_${todayStr}`;
      const notif=window._notifiedTasks||new Set();
      if(!notif.has(key)){
        notif.add(key);window._notifiedTasks=notif;
        sendPushNotif(`😴 Cliente inactivo`,`${lead.nombre} lleva +${inactiveDays} días sin actividad. ¡Muévelo!`,lead.id);
        await addNotif(`😴 ${lead.nombre} lleva más de ${inactiveDays} días sin actividad`,true,lead.asesorId,"inactivo",lead.id);
        if(!isAdmin()&&lead.asesorId===CU.uid){
          await addNotif(`😴 Tu cliente "${lead.nombre}" lleva +${inactiveDays} días sin actividad. ¡Dale seguimiento!`,false,CU.uid,"inactivo",lead.id);
        }
        if(isAdmin()&&lead.asesorId){
          await addNotif(`🚨 Diego te avisa: "${lead.nombre}" lleva +${inactiveDays} días sin actividad. ¡Muévelo ya!`,false,lead.asesorId,"inactivo_aviso",lead.id);
        }
      }
    }
  }
}

async function scoreAllLeads(){
  if(!isAdmin())return;
  const active=leads.filter(l=>!["ganado","perdido"].includes(l.etapa));
  for(const lead of active.slice(0,10)){ // limit to 10 at a time
    if(lead.score&&lead.scoreDate){
      const d=lead.scoreDate.toDate?lead.scoreDate.toDate():new Date(lead.scoreDate);
      if(new Date()-d<24*60*60*1000)continue; // skip if scored today
    }
    await scoreLead(lead.id);
  }
}

async function scoreLead(leadId){
  const lead=leads.find(l=>l.id===leadId);
  if(!lead)return;
  const prop=props.find(p=>p.id===lead.propiedadId);
  const adv=users.find(u=>u.id===lead.asesorId);
  const tasks=window._tasksCache?.[leadId]||[];
  const doneTasks=tasks.filter(t=>t.completada).length;
  const totalTasks=tasks.length;
  const now=new Date();
  const created=lead.creado?.toDate?lead.creado.toDate():new Date(lead.creado||now);
  const daysInPipeline=Math.floor((now-created)/(1000*60*60*24));

  const prompt=`Eres un experto en ventas de bienes raíces en México. Analiza este lead y dale una puntuación del 1 al 10 de probabilidad de cierre, donde 10 es casi seguro.

Datos:
- Nombre: ${lead.nombre}
- Etapa: ${SM[lead.etapa]?.label}
- Días en el pipeline: ${daysInPipeline}
- Propiedad: ${lead.propiedad||"No especificada"}
- Presupuesto: ${lead.presupuesto?"$"+Number(lead.presupuesto).toLocaleString("es-MX"):"No especificado"}
- Tareas completadas: ${doneTasks}/${totalTasks}
- Notas: ${lead.notas||"Sin notas"}

Responde SOLO con un JSON así (sin markdown):
{"score":7,"razon":"Razón en máximo 15 palabras","accion":"Acción inmediata en máximo 15 palabras"}`;

  try{
    const resp=await callAI([{role:"user",content:prompt}]);
    const clean=resp.replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(clean);
    await updateDoc(doc(db,"leads",leadId),{
      score:parsed.score,
      scoreRazon:parsed.razon,
      scoreAccion:parsed.accion,
      scoreDate:serverTimestamp()
    });
  }catch(e){console.error("Score error",e);}
}

window.openAdminAI=async function(){
  showModal(`
  <div class="modal-hdr"><h2>🤖 IA Analista del equipo</h2><button class="btn-icon" onclick="closeModal()">${icoClose()}</button></div>
  <div class="modal-body">
    <div id="admin-ai-content">
      <div style="display:flex;align-items:center;gap:10px;color:var(--bone2);font-size:13px">
        <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
        <span>Analizando el equipo completo…</span>
      </div>
    </div>
    <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">Pregúntale algo al analista:</div>
      <div style="display:flex;gap:8px">
        <input class="inp" id="admin-ai-q" placeholder="Ej. ¿Quién tiene más probabilidad de cerrar este mes?" style="flex:1;font-size:13px"/>
        <button class="btn btn-primary btn-sm" onclick="sendAdminAI()">Enviar</button>
      </div>
      <div id="admin-ai-chat" style="margin-top:12px;display:flex;flex-direction:column;gap:8px"></div>
    </div>
  </div>`);

  // Generate auto analysis
  const adv=users.filter(u=>u.rol!=="admin");
  const advStats=adv.map(a=>{
    const al=leads.filter(l=>l.asesorId===a.id);
    const active=al.filter(l=>!["ganado","perdido"].includes(l.etapa));
    const gan=al.filter(l=>l.etapa==="ganado"&&!l.pendienteConfirmacion);
    const now=new Date();
    const twoDays=new Date(now-2*24*60*60*1000);
    const inactivos=active.filter(l=>{
      const last=l.actualizado?.toDate?l.actualizado.toDate():new Date(0);
      return last<twoDays;
    });
    const com=gan.reduce((s,l)=>{const p=props.find(p=>p.id===l.propiedadId);return s+(p?.comision||0);},0);
    return{nombre:a.nombre,total:al.length,activos:active.length,ganados:gan.length,inactivos:inactivos.length,comision:com};
  });

  const prompt=`Eres un director comercial experto en bienes raíces. Analiza el desempeño de este equipo de ventas y da un reporte ejecutivo directo y útil.\n\nDATOS DEL EQUIPO:\n${advStats.map(a=>`- ${a.nombre}: ${a.total} leads totales, ${a.activos} activos, ${a.ganados} cierres, ${a.inactivos} leads inactivos +2 días, comisiones ganadas: $${a.comision.toLocaleString("es-MX")}`).join("\n")}\n\nTotal leads en pipeline: ${leads.filter(l=>!["ganado","perdido"].includes(l.etapa)).length}\nLeads con cierre pendiente de confirmación: ${leads.filter(l=>l.pendienteConfirmacion).length}\n\nDame:\n1. Resumen ejecutivo (2-3 oraciones)\n2. ¿Quién está destacando y por qué?\n3. ¿Quién necesita mejorar y qué debe hacer exactamente?\n4. Top 3 acciones inmediatas para el equipo esta semana\n5. Alerta roja si hay algo urgente\n\nSé directo, específico y sin rodeos. Habla como si fueras el jefe.`;

  const resp=await callAI([{role:"user",content:prompt}]);
  const el=document.getElementById("admin-ai-content");
  if(el)el.innerHTML=`<div style="font-size:14px;line-height:1.7;white-space:pre-wrap;color:var(--bone)">${resp}</div>`;
};

window.sendAdminAI=async function(){
  const inp=document.getElementById("admin-ai-q");
  const q=inp?.value.trim();if(!q)return;
  inp.value="";
  const chat=document.getElementById("admin-ai-chat");
  if(chat)chat.innerHTML+=`<div style="background:rgba(201,125,74,.12);border:1px solid rgba(201,125,74,.2);border-radius:8px;padding:10px 12px;font-size:13px;align-self:flex-end">${q}</div><div id="admin-thinking" style="background:var(--ink2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px">Analizando…</div>`;

  const adv=users.filter(u=>u.rol!=="admin");
  const context=`Eres un director comercial experto en bienes raíces. Tienes acceso a estos datos del equipo:
${adv.map(a=>{const al=leads.filter(l=>l.asesorId===a.id);return`${a.nombre}: ${al.length} leads, ${al.filter(l=>l.etapa==="ganado").length} cierres`;}).join(", ")}
Total leads activos: ${leads.filter(l=>!["ganado","perdido"].includes(l.etapa)).length}`;

  const resp=await callAI([{role:"user",content:context},{role:"assistant",content:"Entendido, soy tu analista. ¿Qué necesitas saber?"},{role:"user",content:q}]);
  const thinking=document.getElementById("admin-thinking");
  if(thinking)thinking.outerHTML=`<div style="background:var(--ink2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;white-space:pre-wrap">${resp}</div>`;
};

window.saveReminder=async function(leadId){
  const txt=document.getElementById("rem-txt").value.trim();
  const fecha=document.getElementById("rem-fecha").value;
  const hora=document.getElementById("rem-hora").value;
  if(!txt||!fecha||!hora){alert("Completa todos los campos.");return;}
  // Save as task with special type
  await addDoc(collection(db,"leads",leadId,"tareas"),{
    texto:txt,fechaVence:fecha,hora,completada:false,
    tipo:"cita",creado:serverTimestamp(),creadoPor:CU.uid
  });
  await addHistorial(leadId,`Cita agendada: "${txt}" el ${fmtDateShort(fecha)} a las ${hora}`,"📅");
  // Update lead stage to cita_asignada
  await updateDoc(doc(db,"leads",leadId),{etapa:"cita_asignada",actualizado:serverTimestamp()});
  const lead=leads.find(l=>l.id===leadId);
  await addNotif(`📅 Cita agendada con ${lead?.nombre} el ${fmtDateShort(fecha)} a las ${hora}`,true,null,"cita",leadId);
  if(!isAdmin())sendWA(`📅 *${CP?.nombre}* agendó cita con *${lead?.nombre}* para el ${fmtDateShort(fecha)} a las ${hora}`);
  closeModal();
  alert(`✓ Cita guardada. El cliente pasó a "Cita asignada".`);
};
